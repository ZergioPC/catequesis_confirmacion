<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selecciona los dones del Espíritu Santo</title>
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 2rem;
}

#app {
  max-width: 800px;
  width: 100%;
  text-align: center;
}

h1 {
  font-size: 1.75rem;
  color: #1a1a2e;
  margin-bottom: 0.5rem;
}

#instruction {
  color: #555;
  margin-bottom: 1.5rem;
}

.game-area {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 1.5rem;
}

.column {
  flex: 1;
  min-height: 200px;
}

.column h2 {
  font-size: 1rem;
  color: #333;
  margin-bottom: 0.75rem;
}

.word-container {
  background: white;
  border: 2px dashed #ccc;
  border-radius: 12px;
  padding: 1rem;
  min-height: 200px;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-content: flex-start;
  transition: background 0.2s, border-color 0.2s;
}

.word-container.drag-over {
  background: #e8f4fd;
  border-color: #4a90d9;
}

.drop-zone {
  background: #fafbfc;
}

.word {
  display: inline-block;
  padding: 0.5rem 1rem;
  background: #e3e8ee;
  border-radius: 8px;
  cursor: grab;
  user-select: none;
  font-size: 0.95rem;
  transition: transform 0.15s, box-shadow 0.15s;
  touch-action: none;
}

.word:hover {
  transform: translateY(-2px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.word:active {
  cursor: grabbing;
}

.word.dragging {
  opacity: 0.4;
}

.word.correct {
  background: #c8f7c5;
  border: 2px solid #4caf50;
}

.word.incorrect {
  background: #ffcdd2;
  border: 2px solid #f44336;
}

.word.placed-correct {
  background: #c8f7c5;
  border: 2px solid #4caf50;
}

.word.placed-incorrect {
  background: #ffcdd2;
  border: 2px solid #f44336;
  text-decoration: line-through;
}

.controls {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
  margin-bottom: 1rem;
}

.btn {
  padding: 0.6rem 1.5rem;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-primary {
  background: #4a90d9;
  color: white;
}

.btn-primary:hover {
  background: #357abd;
}

.btn-secondary {
  background: #ccc;
  color: #333;
}

.btn-secondary:hover {
  background: #b3b3b3;
}

#feedback {
  font-size: 1.1rem;
  font-weight: 600;
  min-height: 2rem;
  margin-top: 0.5rem;
}

#feedback.success {
  color: #2e7d32;
}

#feedback.error {
  color: #c62828;
}
  </style>
</head>
<body>
  <div id="app">
    <h1 id="title"></h1>
    <p id="instruction"></p>

    <div class="game-area">
      <div class="column source-column">
        <h2>Palabras</h2>
        <div id="source-container" class="word-container"></div>
      </div>

      <div class="column target-column">
        <h2>Seleccionadas</h2>
        <div id="target-container" class="word-container drop-zone"></div>
      </div>
    </div>

    <div class="controls">
      <button id="check-btn" class="btn btn-primary">Verificar</button>
      <button id="reset-btn" class="btn btn-secondary">Reiniciar</button>
    </div>

    <div id="feedback"></div>
  </div>

  <script>
const WORDS_DATA = {
  "title": "Selecciona los dones del Esp\u00edritu Santo",
  "instruction": "Arrastra solo las palabras que sean dones del Esp\u00edritu Santo a la lista de selecci\u00f3n",
  "words": [
    { "text": "sabidur\u00eda", "correct": true },
    { "text": "entendimiento", "correct": true },
    { "text": "consejo", "correct": true },
    { "text": "fortaleza", "correct": true },
    { "text": "ciencia", "correct": true },
    { "text": "piedad", "correct": true },
    { "text": "temor de Dios", "correct": true },
    { "text": "rosario", "correct": false },
    { "text": "altar", "correct": false },
    { "text": "evangelio", "correct": false },
    { "text": "parroquia", "correct": false },
    { "text": "crucifijo", "correct": false },
    { "text": "catecismo", "correct": false },
    { "text": "monaguillo", "correct": false },
    { "text": "campanario", "correct": false },
    { "text": "novena", "correct": false },
    { "text": "catedral", "correct": false }
  ]
};

let wordsData = null;
let dragItem = null;

const sourceContainer = document.getElementById('source-container');
const targetContainer = document.getElementById('target-container');
const titleEl = document.getElementById('title');
const instructionEl = document.getElementById('instruction');
const feedbackEl = document.getElementById('feedback');
const checkBtn = document.getElementById('check-btn');
const resetBtn = document.getElementById('reset-btn');

function loadWords() {
  wordsData = WORDS_DATA;
  titleEl.textContent = wordsData.title;
  instructionEl.textContent = wordsData.instruction;
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function render() {
  sourceContainer.innerHTML = '';
  targetContainer.innerHTML = '';
  feedbackEl.textContent = '';
  feedbackEl.className = '';

  const shuffled = shuffle([...wordsData.words]);
  shuffled.forEach(w => {
    const el = createWordElement(w);
    sourceContainer.appendChild(el);
  });
}

function createWordElement(word) {
  const el = document.createElement('span');
  el.className = 'word';
  el.textContent = word.text;
  el.dataset.correct = word.correct;
  el.draggable = true;

  el.addEventListener('dragstart', onDragStart);
  el.addEventListener('dragend', onDragEnd);

  el.addEventListener('touchstart', onTouchStart, { passive: true });
  el.addEventListener('touchmove', onTouchMove, { passive: false });
  el.addEventListener('touchend', onTouchEnd, { passive: true });

  return el;
}

function onDragStart(e) {
  dragItem = e.target;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  dragItem = null;
}

sourceContainer.addEventListener('dragover', e => e.preventDefault());
targetContainer.addEventListener('dragover', e => {
  e.preventDefault();
  targetContainer.classList.add('drag-over');
});
targetContainer.addEventListener('dragleave', () => {
  targetContainer.classList.remove('drag-over');
});
targetContainer.addEventListener('drop', onDropTarget);

sourceContainer.addEventListener('drop', onDropSource);

function onDropTarget(e) {
  e.preventDefault();
  targetContainer.classList.remove('drag-over');
  if (!dragItem || dragItem.closest('.word-container') === targetContainer) return;
  moveWord(dragItem, targetContainer);
}

function onDropSource(e) {
  e.preventDefault();
  if (!dragItem || dragItem.closest('.word-container') === sourceContainer) return;
  moveWord(dragItem, sourceContainer);
}

function moveWord(el, target) {
  el.classList.remove('correct', 'incorrect', 'placed-correct', 'placed-incorrect');
  target.appendChild(el);
  feedbackEl.textContent = '';
  feedbackEl.className = '';
}

function onTouchStart(e) {
  dragItem = e.target.closest('.word');
  if (!dragItem) return;
  const touch = e.touches[0];
  dragItem._touchOffsetX = touch.clientX - dragItem.getBoundingClientRect().left;
  dragItem._touchOffsetY = touch.clientY - dragItem.getBoundingClientRect().top;
  dragItem.style.position = 'fixed';
  dragItem.style.zIndex = 1000;
  dragItem.style.pointerEvents = 'none';
  dragItem.style.width = dragItem.offsetWidth + 'px';
  updateTouchPosition(touch);
  dragItem.classList.add('dragging');
}

function onTouchMove(e) {
  if (!dragItem) return;
  e.preventDefault();
  const touch = e.touches[0];
  updateTouchPosition(touch);
}

function onTouchEnd(e) {
  if (!dragItem) return;
  dragItem.style.position = '';
  dragItem.style.zIndex = '';
  dragItem.style.pointerEvents = '';
  dragItem.style.width = '';
  dragItem.style.left = '';
  dragItem.style.top = '';
  dragItem.classList.remove('dragging');

  const touch = e.changedTouches[0];
  const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);

  let container = dropTarget?.closest('.word-container');
  if (!container) {
    const word = dropTarget?.closest('.word');
    if (word) container = word.closest('.word-container');
  }

  if (container) {
    const current = dragItem.closest('.word-container');
    if (current !== container) {
      moveWord(dragItem, container);
    }
  }
  dragItem = null;
}

function updateTouchPosition(touch) {
  dragItem.style.left = (touch.clientX - dragItem._touchOffsetX) + 'px';
  dragItem.style.top = (touch.clientY - dragItem._touchOffsetY) + 'px';
}

checkBtn.addEventListener('click', () => {
  const items = targetContainer.querySelectorAll('.word');
  let allCorrect = true;

  items.forEach(el => {
    const isCorrect = el.dataset.correct === 'true';
    if (isCorrect) {
      el.className = 'word placed-correct';
    } else {
      el.className = 'word placed-incorrect';
      allCorrect = false;
    }
  });

  const sourceItems = sourceContainer.querySelectorAll('.word');
  sourceItems.forEach(el => {
    const isCorrect = el.dataset.correct === 'true';
    el.className = 'word';
    if (isCorrect) {
      el.classList.add('incorrect');
      allCorrect = false;
    }
  });

  if (allCorrect) {
    feedbackEl.textContent = '\u2713 \u00a1Correcto! Has seleccionado todas las palabras correctas.';
    feedbackEl.className = 'success';
  } else {
    feedbackEl.textContent = '\u2717 Hay palabras incorrectas en tu selecci\u00f3n. Intenta de nuevo.';
    feedbackEl.className = 'error';
  }
});

resetBtn.addEventListener('click', render);

loadWords();
  </script>
</body>
</html>
