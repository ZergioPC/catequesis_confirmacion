<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junta Palabras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Junta cada palabra con su significado</h1>
        <p class="instructions">Haz clic en una palabra y luego en su significado para unirlos</p>
        <div id="score">Parejas: <span id="pairs-count">0</span> / <span id="total-pairs">0</span></div>
        <div id="timer">⏱️ <span id="timer-display">00:00</span></div>
        <div id="game-board"></div>
        <button id="reset-btn">Reiniciar</button>
        <div id="message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
